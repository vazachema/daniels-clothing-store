info:
  name: Refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.accessToken
        bru.setEnvVar("token", token, { persist: true })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
