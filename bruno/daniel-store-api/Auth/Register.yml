info:
  name: Register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
          "name": "{{name}}",
          "email": "{{email}}",
          "password": "{{pass}}"
        }
  auth: inherit

runtime:
  variables:
    - name: name
      value: Chema
    - name: email
      value: vazachema@gmail.com
    - name: pass
      value: HolaMeLLamoChema123

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
