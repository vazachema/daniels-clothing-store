info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{pass}}"
      }
  auth: inherit

runtime:
  variables:
    - name: email
      value: vazachema@gmail.com
    - name: pass
      value: HolaMeLLamoChema123
  scripts:
    - type: after-response
      code: |-
        const token = res.body.accessToken
        bru.setEnvVar("token", token, { persist: true })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
