info:
  name: Create Category
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/categories"
  body:
    type: json
    data: |-
      {
        "name": "{{name}}"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: name
      value: Pantalones

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
