info:
  name: Update Me
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/users/me"
  body:
    type: json
    data: |-
      {
        "name": "{{name}}"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: name
      value: Daniel Actualizado

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
