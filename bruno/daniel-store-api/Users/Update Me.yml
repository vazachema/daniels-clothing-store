info:
  name: Update Me
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/users/me"
  body:
    type: json
    data: |-
      {
        "name": "Daniel Actualizado"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
